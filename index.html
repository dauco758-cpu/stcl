<!DOCTYPE html><html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Online</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    header { background: #333; color: white; padding: 15px; text-align: center; }
    .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
    .product { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .product img { width: 100%; border-radius: 10px; }
    .product h3 { margin: 10px 0; }
    .price { color: red; font-weight: bold; }
    button { background: green; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    button:hover { background: darkgreen; }
  </style>
</head>
<body><header>
  <h1>🛒 Cửa Hàng Online</h1>
</header><div class="container" id="product-list">
</div><script>
  const products = [
    { id: 1, name: "Áo thun", price: 120000, img: "https://via.placeholder.com/200" },
    { id: 2, name: "Quần jean", price: 350000, img: "https://via.placeholder.com/200" },
    { id: 3, name: "Giày sneaker", price: 800000, img: "https://via.placeholder.com/200" }
  ];

  const productList = document.getElementById("product-list");

  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";
    div.innerHTML = `
      <img src="${p.img}" />
      <h3>${p.name}</h3>
      <p class="price">${p.price.toLocaleString()} VNĐ</p>
      <button onclick="addToCart('${p.name}')">Thêm vào giỏ</button>
    `;
    productList.appendChild(div);
  });

  function addToCart(name) {
    alert("Đã thêm " + name + " vào giỏ hàng!");
  }
</script></body>
</html>
<!DOCTYPE html><html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Auth Demo</title>
  <style>
    body { font-family: Arial; background:#f2f2f2; display:flex; justify-content:center; align-items:center; height:100vh; }
    .box { background:white; padding:20px; border-radius:10px; width:300px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
    input { width:100%; padding:8px; margin:8px 0; }
    button { width:100%; padding:10px; }
    .link { color:blue; cursor:pointer; font-size:14px; }
  </style>
</head>
<body>
<div class="box" id="app"></div><script>
const app = document.getElementById('app');

let users = JSON.parse(localStorage.getItem('users')) || [];

function showLogin() {
  app.innerHTML = `
    <h3>Đăng nhập</h3>
    <input id="loginUser" placeholder="Tài khoản">
    <input id="loginPass" type="password" placeholder="Mật khẩu">
    <button onclick="login()">Đăng nhập</button>
    <p class="link" onclick="showRegister()">Đăng ký</p>
    <p class="link" onclick="showForgot()">Quên mật khẩu?</p>
  `;
}

function showRegister() {
  app.innerHTML = `
    <h3>Đăng ký</h3>
    <input id="regUser" placeholder="Tài khoản">
    <input id="regPass" type="password" placeholder="Mật khẩu">
    <button onclick="register()">Đăng ký</button>
    <p class="link" onclick="showLogin()">Quay lại đăng nhập</p>
  `;
}

function showForgot() {
  app.innerHTML = `
    <h3>Quên mật khẩu</h3>
    <input id="forgotUser" placeholder="Tài khoản">
    <button onclick="forgot()">Lấy lại mật khẩu</button>
    <p class="link" onclick="showLogin()">Quay lại</p>
  `;
}

function register() {
  const user = document.getElementById('regUser').value;
  const pass = document.getElementById('regPass').value;

  if (!user || !pass) return alert('Nhập đầy đủ!');

  if (users.find(u => u.user === user)) {
    alert('Tài khoản đã tồn tại!');
    return;
  }

  users.push({ user, pass });
  localStorage.setItem('users', JSON.stringify(users));
  alert('Đăng ký thành công!');
  showLogin();
}

function login() {
  const user = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;

  const found = users.find(u => u.user === user && u.pass === pass);

  if (found) {
    alert('Đăng nhập thành công!');
  } else {
    alert('Sai tài khoản hoặc mật khẩu!');
  }
}

function forgot() {
  const user = document.getElementById('forgotUser').value;
  const found = users.find(u => u.user === user);

  if (found) {
    alert('Mật khẩu của bạn là: ' + found.pass);
  } else {
    alert('Không tìm thấy tài khoản!');
  }
}

showLogin();
</script></body>
</html>
